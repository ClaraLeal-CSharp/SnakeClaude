name: Deploy Snake Claude → GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Blazor WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SnakeClaude.csproj

      - name: Publish (static WASM)
        run: |
          dotnet publish SnakeClaude.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Fix base path para GitHub Pages
        # O repo NÃO é usuario.github.io → está em /SnakeClaude/
        # Ajusta o <base href> para o nome correto do repositório
        run: |
          sed -i 's|<base href="/" />|<base href="/SnakeClaude/" />|g' publish/wwwroot/index.html
          sed -i 's|var segmentCount = 0|var segmentCount = 1|g' publish/wwwroot/404.html
          echo "Base path ajustado para /SnakeClaude/"
          grep 'base href' publish/wwwroot/index.html

      - name: Upload artifact para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    name: Deploy para GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
